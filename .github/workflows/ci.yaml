name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy infra/ track_genai/src/ --ignore-missing-imports
